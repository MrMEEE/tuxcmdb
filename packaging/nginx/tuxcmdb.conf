# TuxCMDB – nginx HTTPS reverse proxy
# Place in /etc/nginx/conf.d/tuxcmdb.conf
#
# Adjust ssl_certificate / ssl_certificate_key for your environment,
# then: systemctl reload nginx

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/pki/tls/certs/tuxcmdb.crt;
    ssl_certificate_key /etc/pki/tls/private/tuxcmdb.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── API (/api/ → port 8080, /api prefix stripped) ────────────────────────
    location = /api {
        return 301 /api/;
    }
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebUI WebSocket (Django Channels – /ws/) ──────────────────────────────
    location /ws/ {
        proxy_pass             http://127.0.0.1:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
    }

    # ── WebUI (everything else → port 8000) ──────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
