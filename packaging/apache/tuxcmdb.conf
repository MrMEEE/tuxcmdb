# TuxCMDB – Apache HTTPS reverse proxy
# Place in /etc/httpd/conf.d/tuxcmdb.conf  (RHEL/CentOS/Rocky)
#   or  /etc/apache2/sites-available/tuxcmdb.conf  (Debian/Ubuntu)
#
# Required modules (enable with: a2enmod / LoadModule):
#   mod_ssl  mod_proxy  mod_proxy_http  mod_proxy_wstunnel
#   mod_headers  mod_rewrite
#
# Adjust SSLCertificateFile / SSLCertificateKeyFile for your environment,
# then: systemctl reload httpd  (or apache2)

<VirtualHost *:80>
    ServerName _default_
    RewriteEngine on
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName _default_

    SSLEngine             on
    SSLCertificateFile    /etc/pki/tls/certs/tuxcmdb.crt
    SSLCertificateKeyFile /etc/pki/tls/private/tuxcmdb.key
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # ── API (/api/ → port 8080, /api prefix stripped) ────────────────────────
    # More-specific rules must appear before the catch-all below.
    ProxyPass        /api/ http://127.0.0.1:8080/
    ProxyPassReverse /api/ http://127.0.0.1:8080/

    # ── WebUI WebSocket (Django Channels – /ws/) ──────────────────────────────
    ProxyPass        /ws/  ws://127.0.0.1:8000/ws/
    ProxyPassReverse /ws/  ws://127.0.0.1:8000/ws/

    # ── WebUI (everything else → port 8000) ──────────────────────────────────
    ProxyPass        /     http://127.0.0.1:8000/
    ProxyPassReverse /     http://127.0.0.1:8000/
</VirtualHost>
