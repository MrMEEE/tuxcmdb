name: Build Linux Agent DEB Package

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates ruby ruby-dev
          sudo gem install --no-document fpm

      - name: Prepare build root
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ITERATION="1.debian"
          DIST_DIR="dist/deb"

          rm -rf buildroot "$DIST_DIR"
          mkdir -p "$DIST_DIR"
          mkdir -p buildroot/opt/tuxcmdb-agent/lib
          mkdir -p buildroot/usr/bin
          mkdir -p buildroot/lib/systemd/system

          python3 -m pip install --upgrade pip
          python3 -m pip install -r agent/linux/requirements.txt -t buildroot/opt/tuxcmdb-agent/lib

          cp agent/linux/tuxcmdb_agent.py buildroot/opt/tuxcmdb-agent/tuxcmdb_agent.py
          chmod +x buildroot/opt/tuxcmdb-agent/tuxcmdb_agent.py

          cat > buildroot/usr/bin/tuxcmdb-agent <<'EOF'
          #!/usr/bin/env bash
          export PYTHONPATH="/opt/tuxcmdb-agent/lib${PYTHONPATH:+:$PYTHONPATH}"
          exec /usr/bin/python3 /opt/tuxcmdb-agent/tuxcmdb_agent.py "$@"
          EOF
          chmod +x buildroot/usr/bin/tuxcmdb-agent

          cp agent/linux/systemd/tuxcmdb-agent.service buildroot/lib/systemd/system/tuxcmdb-agent.service
          cp agent/linux/systemd/tuxcmdb-agent.timer buildroot/lib/systemd/system/tuxcmdb-agent.timer

          chmod +x packaging/scripts/postinstall.sh packaging/scripts/preuninstall.sh

          fpm -s dir -t deb \
            -n tuxcmdb-agent \
            -v "$VERSION" \
            --iteration "$ITERATION" \
            --architecture all \
            --depends python3 \
            --after-install packaging/scripts/postinstall.sh \
            --before-remove packaging/scripts/preuninstall.sh \
            -C buildroot .

          mv ./*.deb "$DIST_DIR"/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuxcmdb-agent-deb
          path: dist/deb/*.deb

      - name: Attach DEB to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/deb/*.deb