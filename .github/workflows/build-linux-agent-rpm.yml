name: Build Linux Agent Packages

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - el: 9
            container: registry.access.redhat.com/ubi9/ubi:latest
          - el: 10
            container: registry.access.redhat.com/ubi10/ubi:latest

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fpm
        run: |
          set -euo pipefail
          dnf install -y git ca-certificates python3 python3-pip ruby ruby-devel rpm-build findutils
          gem install --no-document fpm

      - name: Prepare build root
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ITERATION="1.el${{ matrix.el }}"
          mkdir -p buildroot/opt/tuxcmdb-agent
          mkdir -p buildroot/usr/bin
          mkdir -p buildroot/usr/lib/systemd/system

          python3 -m pip install --upgrade pip
          python3 -m pip install -r agent/linux/requirements.txt -t buildroot/opt/tuxcmdb-agent/lib

          cp agent/linux/tuxcmdb_agent.py buildroot/opt/tuxcmdb-agent/tuxcmdb_agent.py
          chmod +x buildroot/opt/tuxcmdb-agent/tuxcmdb_agent.py

          cat > buildroot/usr/bin/tuxcmdb-agent <<'EOF'
          #!/usr/bin/env bash
          exec /usr/bin/python3 /opt/tuxcmdb-agent/tuxcmdb_agent.py "$@"
          EOF
          chmod +x buildroot/usr/bin/tuxcmdb-agent

          cp agent/linux/systemd/tuxcmdb-agent.service buildroot/usr/lib/systemd/system/tuxcmdb-agent.service
          cp agent/linux/systemd/tuxcmdb-agent.timer buildroot/usr/lib/systemd/system/tuxcmdb-agent.timer

          chmod +x packaging/scripts/postinstall.sh packaging/scripts/preuninstall.sh

          fpm -s dir -t rpm \
            -n tuxcmdb-agent \
            -v "$VERSION" \
            --iteration "$ITERATION" \
            --architecture noarch \
            --depends python3 \
            --after-install packaging/scripts/postinstall.sh \
            --before-remove packaging/scripts/preuninstall.sh \
            -C buildroot .

          mkdir -p dist/el${{ matrix.el }}
          mv ./*.rpm dist/el${{ matrix.el }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuxcmdb-agent-rpm-el${{ matrix.el }}
          path: dist/el${{ matrix.el }}/*.rpm

      - name: Attach RPM to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/el${{ matrix.el }}/*.rpm
